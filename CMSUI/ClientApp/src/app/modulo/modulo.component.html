<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Módulos</h4>
    <button class="btn btn-primary btn-sm" (click)="novo()" *ngIf="!modoEdicao && usuario?.acessoTotal">+ Novo Módulo</button>
  </div>

  <div *ngIf="erro" class="alert alert-danger alert-dismissible mb-3">
    {{ erro }}
    <button type="button" class="btn-close" (click)="erro = ''"></button>
  </div>

  <div *ngIf="modoEdicao" class="card mb-3">
    <div class="card-body">
      <h5>{{ selecionado?.moduloid ? 'Editar' : 'Novo' }} Módulo</h5>
      <div class="row g-2">
        <div class="col-md-5">
          <label class="form-label">Nome</label>
          <input class="form-control" [(ngModel)]="selecionado.nome" placeholder="Nome do módulo">
        </div>
        <div class="col-md-5">
          <label class="form-label">URL</label>
          <input class="form-control" [(ngModel)]="selecionado.url" placeholder="/caminho">
        </div>
        <div class="col-md-2">
          <label class="form-label">Posição</label>
          <input type="number" class="form-control" [(ngModel)]="selecionado.posicao" min="0">
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-success btn-sm me-2" (click)="salvar()">Salvar</button>
        <button class="btn btn-secondary btn-sm" (click)="cancelar()">Cancelar</button>
      </div>
    </div>
  </div>

  <table class="table table-striped table-hover" *ngIf="!modoEdicao">
    <thead class="table-dark">
      <tr>
        <th>Posição</th>
        <th>Nome</th>
        <th>URL</th>
        <th *ngIf="usuario?.acessoTotal"></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of lista">
        <td>{{ item.posicao ?? '—' }}</td>
        <td>{{ item.nome }}</td>
        <td><small class="text-muted">{{ item.url }}</small></td>
        <td *ngIf="usuario?.acessoTotal">
          <button class="btn btn-outline-primary btn-sm me-1" (click)="editar(item)">Editar</button>
          <button class="btn btn-outline-danger btn-sm" (click)="excluir(item.moduloid)">Excluir</button>
        </td>
      </tr>
      <tr *ngIf="lista.length === 0">
        <td [colSpan]="usuario?.acessoTotal ? 4 : 3" class="text-center text-muted">Nenhum módulo cadastrado.</td>
      </tr>
    </tbody>
  </table>
</div>
